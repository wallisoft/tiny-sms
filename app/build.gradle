plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.wallisoft.tinysms'
    compileSdk 35

    defaultConfig {
        applicationId "com.wallisoft.tinysms"
        minSdk 26
        targetSdk 35
        versionCode 5
        versionName "1.1"
    }

    buildTypes {
        release { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildFeatures {
        viewBinding true
        buildConfig true
    }
    packaging {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES','META-INF/LICENSE',
                'META-INF/LICENSE.txt','META-INF/NOTICE',
                'META-INF/NOTICE.txt','META-INF/*.kotlin_module',
                'META-INF/INDEX.LIST', 'META-INF/LICENSE.md', 'META-INF/NOTICE.md'
            ]
        }
    }
}

dependencies {
    implementation 'com.sun.mail:android-mail:1.6.7'
    implementation 'com.sun.mail:android-activation:1.6.7'
    implementation 'androidx.work:work-runtime:2.9.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    // Firebase BoM
    implementation platform('com.google.firebase:firebase-bom:34.11.0')
    implementation 'com.google.firebase:firebase-messaging'
}
